<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="fourFiles.css">
    <title>Listes de tâches</title>
</head>
<body>
    <div class="container">
        <h1 class="title">Gestionnaire de tâches</h1>
        <p>Trois listes ci-dessous représentent les états de chaque tâche, si vous voulez supprimer un tâche, mettez la dans la corbeille et videz la.</p>
        <div class="row">
            <div class="col-6">
                <input class="form-control" type="text" id="tache">
            </div>
            <div class="col-2">
                <button onclick="ajouterTache()" class="btn btn-primary">Ajouter la tâche</button>
            </div>
            <div class="col-2">
                <button onclick="viderCorbeille()" class="btn btn-warning">Vider la corbeille</button>
            </div>
            <div class="col-2">
                <button onclick="sauvegarderTaches()" class="btn btn-primary">Sauvegarder</button>
            </div>
        </div>
        <div class="row">
            <div class="col-3" id="liste">
                <ul class="list-group">
                    <li class="list-group-item">A faire</li>
                </ul>
                <ul class="list-group" id="a_faire">
                </ul>
            </div>
            <div class="col-3" id="liste">
                <ul class="list-group">
                    <li class="list-group-item">En cours</li>
                </ul>
                <ul class="list-group" id="en_cours">
                    
                </ul>
            </div>
            <div class="col-3" id="liste">
                <ul class="list-group">
                    <li class="list-group-item">Fait</li>
                </ul>
                <ul class="list-group" id="fait">
                    
                </ul>
            </div>
            <div class="col-3" id="liste">
                <ul class="list-group">
                    <li class="list-group-item">Corbeille</li>
                </ul>
                <ul class="list-group" id="corbeille">
                    
                </ul>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="fourLists.js"></script>
</body>
</html>
